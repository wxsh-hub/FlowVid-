version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - video-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/video_platform.db
    networks:
      - video-network

networks:
  video-network:
    driver: bridge
